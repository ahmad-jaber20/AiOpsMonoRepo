name: Monorepo CI/CD Automation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_matrix:
    name: Backend tests / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '18.x'
          - '20.x'
          - '22.x'

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/backend/package-lock.json

      - name: Restore backend node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: src/backend/node_modules
          key: backend-node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('src/backend/package-lock.json') }}
          restore-keys: |
            backend-node-modules-${{ runner.os }}-${{ matrix.node-version }}-

      - name: Install backend dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Verify dependency tree
        run: npm ls --omit=optional || true

      - name: Run backend tests
        run: npm test

  sonarqube_analysis:
    name: SonarQube analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=github_task_monorepo
            -Dsonar.projectName=github_task_monorepo
            -Dsonar.sources=src
            -Dsonar.tests=src/backend
            -Dsonar.test.inclusions=src/backend/**/*.test.js
            -Dsonar.exclusions=**/node_modules/**
            -Dsonar.sourceEncoding=UTF-8

  simulate_deployment:
    name: Simulate secure deployment
    runs-on: ubuntu-latest
    needs:
      - test_matrix
      - sonarqube_analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Simulate deployment validation
        run: |
          set -euo pipefail
          echo "Starting secure deployment simulation..."
          echo "Commit: $GITHUB_SHA"
          echo "Ref: $GITHUB_REF"
          test -d src/frontend
          test -d src/backend
          echo "Validated monorepo deployment inputs."
          echo "No real infrastructure was changed."
          echo "Deployment simulation completed successfully."

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - simulate_deployment
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish versioned release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
